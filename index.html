<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oluwasakeu Capital — Crypto Futures Trading</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy: #060D1F;
      --navy-2: #0B1629;
      --navy-3: #0F1E38;
      --navy-4: #152540;
      --green: #00C896;
      --green-dim: rgba(0,200,150,0.12);
      --green-glow: rgba(0,200,150,0.25);
      --blue: #1A56DB;
      --blue-dim: rgba(26,86,219,0.15);
      --red: #FF4D6D;
      --white: #F0F4FF;
      --grey: #6B7FA3;
      --light: #1A2540;
      --border: rgba(0,200,150,0.15);
      --border-w: rgba(255,255,255,0.07);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--navy);color:var(--white);overflow-x:hidden;}

    /* TICKER */
    .ticker-bar{background:var(--navy-2);border-bottom:1px solid var(--border);padding:8px 0;overflow:hidden;position:fixed;top:0;left:0;right:0;z-index:1001;}
    .ticker-track{display:flex;gap:48px;animation:ticker 30s linear infinite;white-space:nowrap;}
    @keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .ticker-item{display:flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;}
    .ticker-symbol{color:var(--white);letter-spacing:0.05em;}
    .ticker-price{color:var(--grey);}
    .ticker-up{color:var(--green);}
    .ticker-down{color:var(--red);}

    /* NAV */
    nav{position:fixed;top:33px;left:0;right:0;z-index:999;background:rgba(6,13,31,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-w);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:66px;}
    .nav-logo{display:flex;flex-direction:column;gap:2px;}
    .nav-logo-name{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--white);letter-spacing:0.02em;}
    .nav-logo-name span{color:var(--green);}
    .nav-logo-tag{font-size:9px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--grey);}
    .hamburger{background:none;border:none;cursor:pointer;padding:8px;display:flex;flex-direction:column;gap:5px;}
    .hamburger span{display:block;width:24px;height:2px;background:var(--white);border-radius:2px;transition:all 0.3s;}
    .hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
    .hamburger.open span:nth-child(2){opacity:0;}
    .hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

    /* MOBILE MENU */
    .mobile-menu{position:fixed;top:99px;left:0;right:0;bottom:0;background:var(--navy-2);z-index:998;overflow-y:auto;transform:translateX(-100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);padding:24px;}
    .mobile-menu.open{transform:translateX(0);}
    .menu-auth{display:flex;gap:10px;margin-bottom:24px;}
    .menu-btn{flex:1;padding:13px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;border:none;transition:all 0.2s;}
    .menu-btn.outline{background:transparent;border:1.5px solid var(--border);color:var(--green);}
    .menu-btn.filled{background:var(--green);color:var(--navy);}
    .menu-section{margin-bottom:24px;}
    .menu-section-title{font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--green);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border-w);}
    .menu-link{display:block;padding:11px 0;font-size:15px;font-weight:500;color:rgba(240,244,255,0.8);text-decoration:none;border-bottom:1px solid var(--border-w);transition:color 0.2s;}
    .menu-link:hover{color:var(--green);}
    .menu-link.sub{font-size:13px;font-weight:400;color:var(--grey);padding-left:12px;}
    .menu-link.sub:hover{color:var(--green);}

    /* HERO */
    .hero{min-height:100vh;padding:160px 24px 80px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,200,150,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,150,0.04) 1px,transparent 1px);background-size:50px 50px;}
    .hero-glow-1{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(0,200,150,0.1),transparent 70%);top:-100px;right:-150px;pointer-events:none;}
    .hero-glow-2{position:absolute;width:350px;height:350px;background:radial-gradient(circle,rgba(26,86,219,0.12),transparent 70%);bottom:0;left:-80px;pointer-events:none;}
    .hero-content{position:relative;z-index:2;}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--green-dim);border:1px solid var(--border);border-radius:6px;padding:7px 14px;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--green);margin-bottom:28px;}
    .hero-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--green-glow)}50%{opacity:0.5;box-shadow:0 0 0 6px transparent}}
    .hero h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(32px,9vw,62px);font-weight:700;line-height:1.08;letter-spacing:-0.02em;margin-bottom:22px;}
    .hero h1 .green{color:var(--green);}
    .hero h1 .outline{-webkit-text-stroke:1.5px var(--green);color:transparent;}
    .hero-sub{font-size:15px;font-weight:300;color:var(--grey);line-height:1.8;margin-bottom:36px;max-width:480px;}
    .hero-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:44px;}
    .btn-green{background:var(--green);color:var(--navy);padding:15px 30px;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all 0.2s;font-family:inherit;letter-spacing:0.02em;}
    .btn-green:hover{background:#00E6AD;transform:translateY(-2px);box-shadow:0 8px 30px var(--green-glow);}
    .btn-ghost{background:transparent;color:var(--white);padding:15px 30px;border-radius:8px;font-size:14px;font-weight:600;border:1.5px solid var(--border-w);cursor:pointer;transition:all 0.2s;font-family:inherit;}
    .btn-ghost:hover{border-color:var(--green);color:var(--green);}

    /* LIVE PRICES */
    .price-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px;}
    .price-card{background:var(--navy-3);border:1px solid var(--border-w);border-radius:10px;padding:14px;}
    .pc-symbol{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--grey);margin-bottom:4px;}
    .pc-price{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--white);margin-bottom:4px;}
    .pc-change{font-size:11px;font-weight:600;border-radius:4px;padding:2px 6px;display:inline-block;}
    .up{color:var(--green);background:var(--green-dim);}
    .down{color:var(--red);background:rgba(255,77,109,0.1);}

    /* CHART VISUAL */
    .chart-box{background:var(--navy-3);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;}
    .chart-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey);margin-bottom:4px;}
    .chart-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--green);margin-bottom:16px;}
    .chart-bars{display:flex;align-items:flex-end;gap:6px;height:100px;}
    .cbar{flex:1;border-radius:3px 3px 0 0;background:linear-gradient(180deg,var(--green) 0%,rgba(0,200,150,0.2) 100%);}
    .chart-line{font-size:11px;color:var(--grey);display:flex;justify-content:space-between;margin-top:8px;}
    .chart-glow{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(0deg,rgba(0,200,150,0.06),transparent);}

    /* SEC STRIP */
    .sec-strip{background:var(--navy-2);border-top:1px solid var(--border-w);border-bottom:1px solid var(--border-w);padding:14px 24px;font-size:12px;color:var(--grey);line-height:1.65;text-align:center;}
    .sec-strip strong{color:var(--white);}

    /* SECTIONS */
    section{padding:64px 24px;}
    .section-label{font-size:10px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--green);margin-bottom:10px;display:block;}
    h2{font-family:'Space Grotesk',sans-serif;font-size:clamp(24px,5vw,38px);font-weight:700;line-height:1.15;letter-spacing:-0.02em;margin-bottom:14px;}
    .section-sub{font-size:14px;color:var(--grey);line-height:1.8;margin-bottom:36px;}

    /* SERVICES */
    #services{background:var(--navy-2);}
    .services-grid{display:flex;flex-direction:column;gap:14px;}
    .service-card{background:var(--navy-3);border:1px solid var(--border-w);border-radius:12px;padding:24px;transition:all 0.25s;position:relative;overflow:hidden;}
    .service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--blue));transform:scaleX(0);transform-origin:left;transition:transform 0.3s;}
    .service-card:hover{border-color:var(--border);background:var(--navy-4);}
    .service-card:hover::before{transform:scaleX(1);}
    .svc-icon{font-size:28px;margin-bottom:14px;}
    .svc-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:600;color:var(--white);margin-bottom:8px;}
    .svc-desc{font-size:13px;color:var(--grey);line-height:1.75;}
    .svc-tag{display:inline-block;margin-top:14px;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);background:var(--green-dim);padding:4px 10px;border-radius:4px;}

    /* TRADING SECTION */
    #trading{background:var(--navy);}
    .trading-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:32px;}
    .trade-card{background:var(--navy-3);border:1px solid var(--border-w);border-radius:10px;padding:18px;display:flex;align-items:center;gap:14px;transition:all 0.2s;cursor:pointer;}
    .trade-card:hover{border-color:var(--border);transform:translateX(4px);}
    .trade-icon{width:44px;height:44px;border-radius:10px;background:var(--green-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .trade-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--white);margin-bottom:2px;}
    .trade-pair{font-size:11px;color:var(--grey);}
    .trade-return{margin-left:auto;text-align:right;flex-shrink:0;}
    .trade-pct{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--green);}
    .trade-period{font-size:10px;color:var(--grey);}

    /* TOKENS */
    #tokens{background:var(--navy-2);}
    .tokens-intro{background:var(--navy-3);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px;}
    .tokens-intro-text{font-size:13px;color:var(--grey);line-height:1.7;}
    .tokens-intro-text strong{color:var(--green);}
    .token-list{display:flex;flex-direction:column;gap:10px;}
    .token-item{background:var(--navy-3);border:1px solid var(--border-w);border-radius:10px;padding:16px;display:flex;align-items:center;gap:12px;transition:all 0.2s;}
    .token-item:hover{border-color:var(--border);}
    .token-logo{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .token-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:var(--white);}
    .token-sym{font-size:11px;color:var(--grey);}
    .token-signal{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:0.06em;padding:4px 10px;border-radius:4px;flex-shrink:0;}
    .signal-buy{background:var(--green-dim);color:var(--green);}
    .signal-watch{background:rgba(26,86,219,0.15);color:#5B8BF5;}
    .signal-hot{background:rgba(255,165,0,0.12);color:#FFA500;}

    /* WHY */
    #why{background:var(--navy);}
    .why-grid{display:flex;flex-direction:column;gap:14px;}
    .why-card{background:var(--navy-3);border:1px solid var(--border-w);border-radius:12px;padding:22px;transition:all 0.2s;}
    .why-card:hover{border-color:var(--border);background:var(--navy-4);}
    .why-icon{font-size:26px;margin-bottom:12px;}
    .why-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--white);margin-bottom:6px;}
    .why-desc{font-size:13px;color:var(--grey);line-height:1.7;}

    /* PROCESS */
    #process{background:var(--navy-2);}
    .steps{display:flex;flex-direction:column;}
    .step{display:flex;gap:18px;padding:22px 0;border-bottom:1px solid var(--border-w);}
    .step:last-child{border-bottom:none;}
    .step-num{width:42px;height:42px;border-radius:8px;background:var(--green-dim);border:1px solid var(--border);color:var(--green);font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .step-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:var(--white);margin-bottom:5px;}
    .step-desc{font-size:13px;color:var(--grey);line-height:1.65;}

    /* MENTORSHIP */
    #mentorship{background:var(--navy);}
    .mentor-cards{display:flex;flex-direction:column;gap:14px;}
    .mentor-card{background:var(--navy-3);border:1px solid var(--border-w);border-radius:12px;padding:22px;transition:all 0.2s;}
    .mentor-card:hover{border-color:var(--border);}
    .mentor-card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .mentor-plan{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--white);}
    .mentor-badge{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:4px;}
    .badge-popular{background:var(--green-dim);color:var(--green);}
    .badge-pro{background:var(--blue-dim);color:#5B8BF5;}
    .mentor-price{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--green);margin-bottom:14px;}
    .mentor-price span{font-size:13px;color:var(--grey);font-weight:400;}
    .mentor-features{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
    .mentor-features li{font-size:13px;color:var(--grey);display:flex;gap:8px;align-items:flex-start;}
    .mentor-features li::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0;margin-top:1px;}
    .mentor-btn{width:100%;padding:12px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .mentor-btn.primary{background:var(--green);color:var(--navy);border:none;}
    .mentor-btn.primary:hover{background:#00E6AD;}
    .mentor-btn.secondary{background:transparent;color:var(--white);border:1.5px solid var(--border-w);}
    .mentor-btn.secondary:hover{border-color:var(--green);color:var(--green);}

    /* FAQ */
    #faq{background:var(--navy-2);}
    .faq-intro{font-size:13px;color:var(--grey);margin-bottom:24px;line-height:1.7;}
    .faq-item{border-bottom:1px solid var(--border-w);}
    .faq-q{display:flex;justify-content:space-between;align-items:center;padding:18px 0;cursor:pointer;font-size:14px;font-weight:600;color:var(--white);gap:12px;user-select:none;}
    .faq-icon{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all 0.25s;font-weight:300;}
    .faq-item.open .faq-icon{background:var(--green);color:var(--navy);transform:rotate(45deg);border-color:var(--green);}
    .faq-a{font-size:13px;color:var(--grey);line-height:1.8;max-height:0;overflow:hidden;transition:max-height 0.35s ease,padding 0.3s;}
    .faq-item.open .faq-a{max-height:300px;padding-bottom:18px;}

    /* CTA */
    .cta-section{background:linear-gradient(135deg,var(--navy-2) 0%,var(--navy-4) 100%);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:64px 24px;text-align:center;position:relative;overflow:hidden;}
    .cta-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(0,200,150,0.07),transparent);}
    .cta-section h2{position:relative;}
    .cta-section p{color:var(--grey);font-size:14px;margin-bottom:28px;line-height:1.75;position:relative;}
    .cta-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:relative;}
    .risk-note{font-size:11px;color:var(--grey);margin-top:20px;position:relative;line-height:1.6;}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;z-index:1100;background:rgba(6,13,31,0.92);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--navy-2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:28px 24px 48px;transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);max-height:90vh;overflow-y:auto;position:relative;}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-handle{width:40px;height:4px;background:var(--light);border-radius:2px;margin:0 auto 22px;}
    .modal-close{position:absolute;top:16px;right:16px;background:var(--navy-3);border:1px solid var(--border-w);border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--grey);}
    .modal-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--white);margin-bottom:4px;}
    .modal-sub{font-size:13px;color:var(--grey);margin-bottom:22px;}
    .modal-tabs{display:flex;background:var(--navy-3);border:1px solid var(--border-w);border-radius:10px;padding:4px;margin-bottom:22px;}
    .modal-tab{flex:1;padding:10px;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;border-radius:7px;color:var(--grey);transition:all 0.2s;font-family:inherit;}
    .modal-tab.active{background:var(--navy-4);color:var(--green);border:1px solid var(--border);}
    .form-group{margin-bottom:14px;}
    .form-group label{display:block;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey);margin-bottom:6px;}
    .form-group input,.form-group select{width:100%;padding:13px 14px;border:1.5px solid var(--border-w);border-radius:10px;font-size:14px;font-family:inherit;color:var(--white);outline:none;transition:border-color 0.2s;background:var(--navy-3);}
    .form-group input:focus,.form-group select:focus{border-color:var(--green);}
    .form-group input::placeholder{color:var(--grey);}
    .form-group select option{background:var(--navy-3);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .form-submit{width:100%;padding:15px;border-radius:10px;background:var(--green);color:var(--navy);font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:6px;letter-spacing:0.02em;}
    .form-submit:hover{background:#00E6AD;}
    .form-panel{display:none;}
    .form-panel.active{display:block;}
    .modal-note{font-size:11px;color:var(--grey);text-align:center;margin-top:10px;line-height:1.6;}
    .success-panel{display:none;text-align:center;padding:20px 0;}
    .success-panel.show{display:block;}
    .success-panel .s-icon{font-size:52px;margin-bottom:14px;}
    .success-panel h3{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--green);margin-bottom:8px;}
    .success-panel p{font-size:13px;color:var(--grey);line-height:1.65;}

<script>
  function toggleMenu(){const m=document.getElementById('mobileMenu'),b=document.getElementById('hamburger');m.classList.toggle('open');b.classList.toggle('open');document.body.style.overflow=m.classList.contains('open')?'hidden':'';}
  function toggleFaq(el){const item=el.parentElement,was=item.classList.contains('open');document.querySelectorAll('.faq-item').forEach(i=>i.classList.remove('open'));if(!was)item.classList.add('open');}
  function openModal(tab){document.getElementById('modalOverlay').classList.add('open');document.getElementById('successPanel').classList.remove('show');document.getElementById('formContent').style.display='block';document.body.style.overflow='hidden';switchTab(tab);}
  function closeModal(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}
  function closeOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
  function switchTab(tab){
    document.getElementById('pLogin').classList.toggle('active',tab==='login');
    document.getElementById('pSignup').classList.toggle('active',tab==='signup');
    document.getElementById('tLogin').classList.toggle('active',tab==='login');
    document.getElementById('tSignup').classList.toggle('active',tab==='signup');
    document.getElementById('mTitle').textContent=tab==='login'?'Welcome Back':'Create Your Account';
    document.getElementById('mSub').textContent=tab==='login'?'Log in to your Oluwasakeu Capital account':'Join hundreds of investors &amp; traders today';
  }
  function handleSubmit(type){
    document.getElementById('formContent').style.display='none';
    document.getElementById('successPanel').classList.add('show');
    if(type==='login'){document.getElementById('sTitle').textContent='Welcome Back! 👋';document.getElementById('sText').textContent='You\'ve successfully logged in. Your dashboard is being prepared.';}
    else{document.getElementById('sTitle').textContent='You\'re In! 🚀';document.getElementById('sText').textContent='Welcome to Oluwasakeu Capital. Our team will reach out via WhatsApp within 24 hours to schedule your free onboarding call.';}
  }

  // Scroll animations
  const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0);'}}),{threshold:0.1});
  document.querySelectorAll('.service-card,.trade-card,.token-item,.why-card,.step,.mentor-card,.faq-item').forEach(el=>{el.style.opacity='0';el.style.transform='translateY(20px)';el.style.transition='opacity 0.5s ease,transform 0.5s ease';obs.observe(el);});
</script>
